<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - RwandaStays</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="index.html">
                <i class="fas fa-mountain text-warning"></i> RwandaStays
            </a>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="fw-bold mb-4">Reset Password</h3>
                <p class="text-muted mb-4">Enter your email or phone number to receive a reset link.</p>
                
                <form>
                    <div class="mb-3">
                        <label class="form-label">Email or Phone Number</label>
                        <input type="text" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 mb-3">
                        Send Reset Link
                    </button>
                    
                    <div class="text-center">
                        <a href="login.html" class="text-decoration-none">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
