<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in or create an account - RwandaBooking</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Simple Header for Auth -->
    <div id="app-header"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h2 style="margin-bottom: 8px;">Sign in or create an account</h2>
                <p style="color: var(--text-secondary);">Unlock the best prices and member-only deals.</p>
            </div>

            <div id="auth-error" style="color: #dc2626; background: #fee2e2; border: 1px solid #fecaca; padding: 12px; border-radius: 6px; margin-bottom: 16px; display: none; font-size: 14px;"></div>
            <div id="auth-success" style="color: #16a34a; background: #dcfce7; border: 1px solid #bbf7d0; padding: 12px; border-radius: 6px; margin-bottom: 16px; display: none; font-size: 14px;"></div>

            <form id="auth-form" onsubmit="handleAuthSubmit(event)">
                <div class="form-group" id="firstNameGroup" style="display: none;">
                    <label class="form-label">First Name</label>
                    <input type="text" id="auth-firstName" class="form-input" placeholder="Enter your first name">
                </div>
                <div class="form-group" id="lastNameGroup" style="display: none;">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="auth-lastName" class="form-input" placeholder="Enter your last name">
                </div>
                <!-- Role selection field -->
                <div class="form-group" id="roleGroup" style="display: none;">
                    <label class="form-label">I am a...</label>
                    <select id="auth-role" class="form-input">
                        <option value="traveler">Traveler (Looking to book)</option>
                        <option value="host">Property Owner (Looking to host)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Email address</label>
                    <input type="email" id="auth-email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                        <label class="form-label" style="margin-bottom: 0;">Password</label>
                        <a href="#" id="forgot-password-link" onclick="handleForgotPassword(event)" style="font-size: 13px; color: var(--brand-primary); text-decoration: none; font-weight: 500;">Forgot password?</a>
                    </div>
                    <div style="position: relative;">
                        <input type="password" id="auth-password" class="form-input" placeholder="Enter your password" required minlength="6" style="padding-right: 40px;">
                        <button type="button" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; padding: 0;">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="auth-submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Sign In</button>
                
                <div style="margin-top: 24px; text-align: center;">
                    <a href="#" id="auth-toggle-link" onclick="toggleAuthMode(event)" style="color: var(--brand-primary); font-size: 14px; font-weight: 600; text-decoration: none;">Don't have an account? Register here</a>
                </div>
            </form>

            <div style="margin: 24px 0; text-align: center; position: relative;">
                <hr style="border: 0; border-top: 1px solid #ddd;">
                <span
                    style="background: white; padding: 0 8px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: var(--text-secondary); font-size: 12px;">or
                    use one of these options</span>
            </div>

            <div style="display: flex; gap: 16px; justify-content: center;">
                <button class="btn btn-secondary"
                    style="border-color: #ddd; color: var(--text-primary); flex: 1;">Google</button>
                <button class="btn btn-secondary"
                    style="border-color: #ddd; color: var(--text-primary); flex: 1;">Facebook</button>
            </div>

            <div style="margin-top: 32px; text-align: center; font-size: 14px;">
                <p>By signing in or creating an account, you agree with our <a href="#"
                        style="color: var(--brand-primary);">Terms & Conditions</a> and <a href="#"
                        style="color: var(--brand-primary);">Privacy Statement</a>.</p>
            </div>

            <div style="margin-top: 24px; text-align: center; font-size: 14px;">
                <a href="index.html" style="color: var(--brand-primary); font-weight: 500;">&larr; Back to Home</a>
            </div>
        </div>
    </div>
    <!-- Footer -->
    <div id="app-footer"></div>
    <script src="js/components.js"></script>
</body>

</html>
