<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#2d5016" rx="10"/>
  
  <!-- Mountain silhouette -->
  <path d="M0 120 L40 80 L80 100 L120 60 L160 90 L200 70 L200 200 L0 200 Z" fill="#1a3d0a" opacity="0.6"/>
  
  <!-- Safari vehicle -->
  <g fill="#febb02">
    <rect x="60" y="95" width="80" height="30" rx="4"/>
    <path d="M65 95 L75 80 L125 80 L135 95 Z"/>
    <circle cx="75" cy="130" r="10" fill="#1a3d0a"/>
    <circle cx="75" cy="130" r="6" fill="#ffffff"/>
    <circle cx="125" cy="130" r="10" fill="#1a3d0a"/>
    <circle cx="125" cy="130" r="6" fill="#ffffff"/>
    <!-- Windows -->
    <rect x="80" y="85" width="15" height="10" fill="#ffffff" opacity="0.8"/>
    <rect x="100" y="85" width="15" height="10" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Acacia tree -->
  <ellipse cx="170" cy="50" rx="20" ry="12" fill="#7fb069" opacity="0.8"/>
  <rect x="168" y="50" width="4" height="15" fill="#8b6f47"/>
  
  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#febb02">SAFARI</text>
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">WHEELS</text>
</svg>
