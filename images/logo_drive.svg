      <stop offset="0%" style="stop-color:#007042;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004d2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Motion lines -->
  <g stroke="#febb02" stroke-width="3" opacity="0.6">
    <line x1="20" y1="70" x2="60" y2="70" stroke-linecap="round"/>
    <line x1="30" y1="85" x2="80" y2="85" stroke-linecap="round"/>
    <line x1="25" y1="100" x2="70" y2="100" stroke-linecap="round"/>
