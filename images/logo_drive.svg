    <circle cx="135" cy="125" r="7" fill="#1a1a1a"/>
    <rect x="100" y="75" width="12" height="10" fill="#ffffff" opacity="0.9"/>
    <rect x="115" y="75" width="12" height="10" fill="#ffffff" opacity="0.9"/>
    <rect x="130" y="75" width="12" height="10" fill="#ffffff" opacity="0.9"/>
  </g>
  
