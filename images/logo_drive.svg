    <path d="M80 85 L80 105 Q80 110 85 110 L95 110 L95 120 Q95 125 100 125 L110 125 Q115 125 115 120 L115 110 L125 110 L125 120 Q125 125 130 125 L140 125 Q145 125 145 120 L145 110 L155 110 Q160 110 160 105 L160 85 Z"/>
