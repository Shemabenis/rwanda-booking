<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#1e3a5f" rx="10"/>
  
  <!-- Minibus -->
  <g fill="#febb02">
    <!-- Body -->
    <rect x="50" y="80" width="100" height="45" rx="5"/>
    <path d="M55 80 L65 65 L135 65 L145 80 Z"/>
    
    <!-- Windows -->
    <rect x="60" y="70" width="12" height="10" fill="#ffffff" opacity="0.9"/>
    <rect x="75" y="70" width="12" height="10" fill="#ffffff" opacity="0.9"/>
    <rect x="90" y="70" width="12" height="10" fill="#ffffff" opacity="0.9"/>
    <rect x="105" y="70" width="12" height="10" fill="#ffffff" opacity="0.9"/>
    <rect x="120" y="70" width="12" height="10" fill="#ffffff" opacity="0.9"/>
    
    <!-- Side windows -->
    <rect x="55" y="85" width="15" height="15" fill="#ffffff" opacity="0.8"/>
    <rect x="73" y="85" width="15" height="15" fill="#ffffff" opacity="0.8"/>
    <rect x="91" y="85" width="15" height="15" fill="#ffffff" opacity="0.8"/>
    <rect x="109" y="85" width="15" height="15" fill="#ffffff" opacity="0.8"/>
    <rect x="127" y="85" width="15" height="15" fill="#ffffff" opacity="0.8"/>
    
    <!-- Wheels -->
    <circle cx="70" cy="130" r="10" fill="#1e3a5f"/>
    <circle cx="70" cy="130" r="6" fill="#ffffff"/>
    <circle cx="130" cy="130" r="10" fill="#1e3a5f"/>
    <circle cx="130" cy="130" r="6" fill="#ffffff"/>
  </g>
  
  <!-- People icons -->
  <g fill="#007042" opacity="0.7">
    <circle cx="25" cy="110" r="6"/>
    <path d="M25 118 Q20 120 20 125 L30 125 Q30 120 25 118 Z"/>
    <circle cx="175" cy="110" r="6"/>
    <path d="M175 118 Q170 120 170 125 L180 125 Q180 120 175 118 Z"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#febb02">GROUP TRAVEL</text>
  <text x="100" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff">COMPANY</text>
</svg>
