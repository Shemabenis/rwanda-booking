<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RwandaBooking - Car Rentals</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .car-card {
            background: white;
            border: 1px solid var(--ui-border);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: var(--shadow-sm);
        }

        @media (min-width: 768px) {
            .car-card {
                flex-direction: row;
                align-items: center;
                gap: 24px;
            }
        }

        .car-image {
            width: 100%;
            max-width: 250px;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }

        .car-details {
            flex: 1;
        }

        .car-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .car-specs {
            display: flex;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
            align-items: center;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .supplier-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--brand-primary);
            font-weight: 600;
        }

        .price-section {
            text-align: right;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
        }

        /* ===== Car Price Summary Modal ===== */
        #car-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 2000;
            align-items: center; justify-content: center; padding: 16px;
        }
        #car-modal-overlay.open { display: flex; }
        #car-modal {
            background: #fff; border-radius: 12px; width: 100%; max-width: 500px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.22); overflow: hidden;
            animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .cm-header {
            background: var(--brand-primary); color: #fff;
            padding: 20px 24px 16px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .cm-header h2 { font-size: 18px; font-weight: 700; margin: 0; }
        .cm-header p  { font-size: 13px; opacity: 0.8; margin: 4px 0 0; }
        .cm-close {
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.15s;
        }
        .cm-close:hover { background: rgba(255,255,255,0.3); }
        .cm-body { padding: 24px; }
        #cm-car-thumb { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; }
        .cm-avail-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #d1fae5; color: #065f46; border-radius: 20px;
            padding: 6px 14px; font-size: 13px; font-weight: 600; margin-bottom: 16px;
        }
        .cm-breakdown { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .cm-breakdown-title {
            background: #f5f7fa; padding: 10px 16px; font-size: 13px;
            font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .cm-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-top: 1px solid #f0f0f0; font-size: 14px;
        }
        .cm-row.total { background: #f0fdf4; font-weight: 700; font-size: 15px; color: var(--brand-primary); }
        .cm-row span:last-child { font-weight: 600; }
        .cm-book-btn {
            width: 100%; padding: 14px; background: var(--brand-secondary); color: #fff;
            border: none; border-radius: 8px; font-size: 17px; font-weight: 700;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .cm-book-btn:hover { background: var(--brand-primary); }
        .cm-book-btn:active { transform: translateY(1px); }
    </style>
</head>

<body>

    <!-- Header -->
    <div id="app-header"></div>

    <div class="container" style="margin-top: 24px;">
        <!-- Search Header -->
        <h1 style="margin-bottom: 24px;">Car Rentals in Rwanda</h1>
        <div class="search-box" style="margin-bottom: 32px;">
            <form class="search-form" onsubmit="handleCarSearch(event)">
                <div class="input-group">
                    <span style="margin-right:8px;">📍</span>
                    <input type="text" id="car-pickup" class="input-field" placeholder="Pick-up location"
                        value="Kigali International Airport">
                </div>
                <!-- Optional Drop-off -->
                <div class="input-group">
                    <span style="margin-right:8px;">📅</span>
                    <input type="date" id="pickup-date" class="input-field" placeholder="Pick-up Date">
                </div>
                <div class="input-group">
                    <span style="margin-right:8px;">📅</span>
                    <input type="date" id="dropoff-date" class="input-field" placeholder="Drop-off Date">
                </div>
                <div class="search-btn-wrapper">
                    <button type="submit" class="search-btn">Search Cars</button>
                </div>
            </form>
        </div>

        <div class="results-list">
            <h2 id="results-count" style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">Available Cars</h2>
            <div id="car-container"></div>
        </div>
    </div>

    <!-- Car Price Summary Modal -->
    <div id="car-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="cm-title">
        <div id="car-modal">
            <div class="cm-header">
                <div>
                    <h2 id="cm-title">Car Rental Summary</h2>
                    <p id="cm-subtitle">Review your rental details below</p>
                </div>
                <button class="cm-close" onclick="closeCarModal()" aria-label="Close">&#x2715;</button>
            </div>
            <div class="cm-body">
                <img id="cm-car-thumb" src="" alt="">
                <div class="cm-avail-badge"><span>✅</span> Available for your selected dates</div>

                <div class="cm-breakdown">
                    <div class="cm-breakdown-title">Price Breakdown</div>
                    <div class="cm-row"><span>🚗 Vehicle</span><span id="cm-car-name">—</span></div>
                    <div class="cm-row"><span>📅 Pickup date</span><span id="cm-pickup-label">—</span></div>
                    <div class="cm-row"><span>📅 Drop-off date</span><span id="cm-dropoff-label">—</span></div>
                    <div class="cm-row"><span>📆 Rental days</span><span id="cm-days-label">—</span></div>
                    <div class="cm-row"><span>💵 Price per day</span><span id="cm-ppd-label">—</span></div>
                    <div class="cm-row total"><span>Total</span><span id="cm-total">—</span></div>
                </div>

                <button class="cm-book-btn" id="cm-book-btn" onclick="confirmCarBooking()">🚗 Book This Car</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="app-footer"></div>

    <script src="js/cars-data.js?v=2"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Set min dates
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('pickup-date').min = today;
            document.getElementById('dropoff-date').min = today;

            // Load initial cars asynchronously
            if (typeof fetchCars !== 'undefined') {
                fetchCars().then(data => {
                    if (typeof _loadedCarsCache !== 'undefined') _loadedCarsCache = data;
                    renderCars(data);
                });
            } else if (typeof cars !== 'undefined') {
                renderCars(cars);
            }
        });

        function handleCarSearch(e) {
            e.preventDefault();
            // In a real app, we'd filter by location availability etc.
            // For now, reload all or mock filter
            alert("Searching for cars...");
            if (typeof _loadedCarsCache !== 'undefined' && _loadedCarsCache.length > 0) {
                renderCars(_loadedCarsCache);
            } else if (typeof cars !== 'undefined') {
                renderCars(cars);
            }
        }

        let _carModalData = null;

        window.triggerCarBooking = function(id, name, pricePerDay, image) {
            const pickupDate = document.getElementById('pickup-date').value;
            const dropoffDate = document.getElementById('dropoff-date').value;

            if (!pickupDate || !dropoffDate) {
                alert('Please select pick-up and drop-off dates first.');
                return;
            }

            const d1 = new Date(pickupDate);
            const d2 = new Date(dropoffDate);
            const diffTime = Math.abs(d2 - d1);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1;
            const total = pricePerDay * diffDays;

            _carModalData = { id, name, pricePerDay, image, pickupDate, dropoffDate, diffDays, total };

            const fmt = d => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

            document.getElementById('cm-title').textContent = name;
            document.getElementById('cm-subtitle').textContent = `${diffDays} day${diffDays > 1 ? 's' : ''} rental`;
            document.getElementById('cm-car-thumb').src = image || '';
            document.getElementById('cm-car-name').textContent = name;
            document.getElementById('cm-pickup-label').textContent = fmt(pickupDate);
            document.getElementById('cm-dropoff-label').textContent = fmt(dropoffDate);
            document.getElementById('cm-days-label').textContent = `${diffDays} day${diffDays > 1 ? 's' : ''}`;
            document.getElementById('cm-ppd-label').textContent = formatCarPrice(pricePerDay);
            document.getElementById('cm-total').textContent = formatCarPrice(total);

            document.getElementById('car-modal-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        };

        window.closeCarModal = function() {
            document.getElementById('car-modal-overlay').classList.remove('open');
            document.body.style.overflow = '';
            _carModalData = null;
        };

        document.getElementById('car-modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeCarModal();
        });

        window.confirmCarBooking = async function() {
            if (!_carModalData) return;
            const btn = document.getElementById('cm-book-btn');
            btn.disabled = true; btn.textContent = 'Processing...';

            if (window.submitBooking) {
                await window.submitBooking({
                    type: 'car',
                    itemId: _carModalData.id,
                    itemName: _carModalData.name + ' Rental',
                    price: _carModalData.total,
                    checkIn: _carModalData.pickupDate,
                    checkOut: _carModalData.dropoffDate,
                    guests: 1
                });
            } else {
                alert('Booking system is not loaded yet. Please try again.');
            }
            btn.disabled = false; btn.innerHTML = '🚗 Book This Car';
            closeCarModal();
        };

        function renderCars(data) {
            const container = document.getElementById('car-container');
            const countLabel = document.getElementById('results-count');

            container.innerHTML = '';
            countLabel.textContent = `${data.length} cars available`;

            data.forEach(c => {
                const html = `
                <div class="car-card">
                    <img src="${c.image}" alt="${c.name}" class="car-image">
                    <div class="car-details">
                        <div class="car-title">${c.name}</div>
                        <div class="car-specs">
                            <span class="spec-item">👤 ${c.seats} Seats</span>
                            <span class="spec-item">⚙️ ${c.transmission}</span>
                            <span class="spec-item">⛽ ${c.fuel}</span>
                        </div>
                        <div class="supplier-info">
                            <img src="${c.supplier_logo}" alt="Logo" style="width: 24px; height: 24px; object-fit: contain;">
                            <span>Supplier: ${c.supplier}</span>
                            <div class="rating-badge" style="font-size: 12px; padding: 2px 6px;">${c.rating}</div>
                        </div>
                    </div>
                    <div class="price-section">
                        <div class="price-text" style="font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px;">${formatCarPrice(c.price)}</div>
                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;">per day</div>
                        <button class="btn btn-primary" onclick="window.triggerCarBooking('${c.id}', '${c.name}', ${c.price}, '${c.image}')">View Deal</button>
                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }
    </script>
</body>

</html>
