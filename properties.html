<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RwandaBooking - Search Results</title>
    <link rel="stylesheet" href="css/styles.css?v=properties-2">
</head>

<body>

    <!-- Header -->
    <!-- Header -->
    <div id="app-header"></div>

    <div class="container" style="margin-top: 24px;">
        <!-- Breadcrumbs -->
        <div class="breadcrumbs">
            <a href="index.html">Home</a> &gt; <span>Rwanda</span> &gt; <span>Search results</span>
        </div>

        <!-- Search Summary / Compact Search (Visual Only for now) -->
        <div class="search-box" style="margin-bottom: 24px;">
            <form class="search-form" onsubmit="handleSearch(event)">
                <div class="input-group">
                    <input type="text" class="input-field" value="Kigali" placeholder="Where are you going?">
                </div>
                <div class="input-group">
                    <input type="text" class="input-field" placeholder="Check-in - Check-out">
                </div>
                <div class="input-group">
                    <input type="text" class="input-field" placeholder="2 adults · 1 room">
                </div>
                <button type="submit" class="search-btn" style="width: auto;">Search</button>
            </form>
        </div>

        <div class="results-container">
            <!-- Sidebar Filters -->
            <aside class="filters-sidebar">
                <h3 style="margin-bottom: 16px;">Filter by:</h3>

                <div class="filter-group">
                    <span class="filter-title">Your budget (per night)</span>
                    <label class="checkbox-row"><input type="checkbox"> <span>RWF 0 - RWF 50,000</span></label>
                    <label class="checkbox-row"><input type="checkbox"> <span>RWF 50,000 - RWF 100,000</span></label>
                    <label class="checkbox-row"><input type="checkbox"> <span>RWF 100,000+</span></label>
                </div>

                <div class="filter-group">
                    <span class="filter-title">Popular filters</span>
                    <label class="checkbox-row"><input type="checkbox"> <span>Hotels</span></label>
                    <label class="checkbox-row"><input type="checkbox"> <span>Free Cancellation</span></label>
                    <label class="checkbox-row"><input type="checkbox"> <span>Breakfast Included</span></label>
                </div>

                <div class="filter-group">
                    <span class="filter-title">Property Type</span>
                    <label class="checkbox-row"><input type="checkbox"> <span>Hotels</span></label>
                    <label class="checkbox-row"><input type="checkbox"> <span>Apartments</span></label>
                    <label class="checkbox-row"><input type="checkbox"> <span>Resorts</span></label>
                    <label class="checkbox-row"><input type="checkbox"> <span>Villas</span></label>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="results-list">
                <h1 id="results-count" style="font-size: 24px; font-weight: 700; margin-bottom: 16px;">Loading
                    properties...</h1>

                <!-- Container for dynamic property cards -->
                <div id="property-container"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <!-- Footer -->
    <div id="app-footer"></div>
    <script src="js/properties-data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
